<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2d7a3a">
  <title>Tactics Board</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body>
  <header class="app-header">
    <button class="btn-icon" id="btn-back">←</button>
    <h1 id="page-title">読込中...</h1>
    <button class="btn-icon" id="btn-share" title="URLをコピー">🔗</button>
  </header>

  <!-- 正常表示 -->
  <main class="main-content" id="main-content" style="display:none">
    <div class="board-container">
      <svg id="board-svg"></svg>
    </div>

    <div class="player-controls">
      <input type="range" class="seekbar" id="seekbar" value="0" min="0" step="50">
      <div class="player-btns">
        <button class="btn-play" id="btn-play">▶</button>
        <button class="speed-btn" data-speed="0.5">0.5×</button>
        <button class="speed-btn active" data-speed="1">1×</button>
        <button class="speed-btn" data-speed="2">2×</button>
      </div>
      <div class="time-display">
        <span id="current-time">0:00</span> / <span id="total-time">0:00</span>
      </div>
    </div>

    <div id="desc-section"></div>

    <div class="share-bar">
      <span class="share-url" id="share-url"></span>
      <button class="btn btn-outline" id="btn-copy" style="padding:8px 14px;font-size:0.82rem">コピー</button>
    </div>

    <div class="comments-section">
      <h3>コメント</h3>
      <div class="comment-form">
        <input type="text" id="comment-name" placeholder="名前（任意）" maxlength="30">
        <textarea id="comment-body" placeholder="コメントを書く..." maxlength="500"></textarea>
        <button class="btn btn-primary" id="btn-comment">投稿</button>
      </div>
      <div class="comment-list" id="comment-list">
        <div class="empty-state">コメントはまだありません</div>
      </div>
    </div>
  </main>

  <!-- エラー表示 -->
  <main class="main-content" id="error-state" style="display:none">
    <div class="empty-state" style="padding:60px 20px">
      <p style="font-size:1.5rem;margin-bottom:8px">🤔</p>
      <p>この戦術は存在しないか、削除されました。</p>
      <a href="/" style="display:inline-block;margin-top:16px;color:var(--accent)">ホームへ戻る</a>
    </div>
  </main>

  <div class="toast" id="toast"></div>
  <script type="module" src="src/pages/viewer.js"></script>
</body>
</html>
